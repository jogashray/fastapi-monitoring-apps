global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: "fastapi-metrics-monitor"

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fastapi-app
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 4s
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "fastapi-app"
          env: "dev"

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]